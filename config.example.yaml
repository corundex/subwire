# subwire configuration — annotated example.
# Copy to config.yaml and edit. Every setting resolves by precedence:
#   explicit tool argument  >  target value  >  defaults below.

defaults:
  timeout: 30                 # seconds, per request

  # --- TLS (read this) --------------------------------------------------------
  # Recommended pattern for a homelab: stand up ONE internal CA, sign your
  # services' certs with it, and point `verify` at the CA root here. Then every
  # *.home.lan host whose cert chains to it validates with verification ON —
  # this is the whole-LAN "wildcard", set once. Drop per-target verify overrides.
  #
  #   verify: /etc/subwire/certs/home-ca.pem
  #
  # Alternatives:
  #   verify: true            # only calling public hosts (default if omitted)
  #   verify: false           # disable verification globally (NOT recommended)
  # You can also point `verify` at a single self-signed *wildcard* cert instead
  # of a CA — see the SAN/wildcard notes in README.md (the cert MUST carry the
  # name in its subjectAltName, not just CN, or validation fails).
  #
  # Docker: drop the CA/cert file in the ./certs/ folder; it's baked to
  # /etc/subwire/certs/. Local (non-Docker): point this at wherever your CA lives.
  verify: /etc/subwire/certs/home-ca.pem

  allow_http: true            # permit plain http:// (set false to force TLS)
  read_only: false            # true => only GET/HEAD/OPTIONS are ever allowed
  max_response_bytes: 100000  # cap returned body size; larger bodies truncated
  follow_redirects: true

  # --- streamable-HTTP transport (only matters when running with --http) ------
  # The MCP SDK protects the HTTP transport from DNS rebinding by checking the
  # Host header against an allowlist. Its default allows only localhost, so a
  # LAN client reaching this server by hostname gets `421 Misdirected Request`.
  # List every hostname/port clients use; "host:*" port-wildcard supported.
  # Or set disable_dns_rebinding_protection: true for a trusted LAN.
  allowed_hosts: []
    # - subwire.home.lan
    # - subwire.home.lan:8081
    # - master.home.lan:*
  disable_dns_rebinding_protection: false

security:
  # This tool is meant to reach internal hosts, so private ranges are allowed by
  # default. The one thing nobody's homelab needs — the cloud metadata endpoint —
  # is blocked by default.
  allow_private: true         # 10/8, 172.16/12, 192.168/16, fc00::/7, *.home.lan, bare hostnames
  allow_loopback: true        # 127.0.0.0/8, ::1
  allow_metadata: false       # 169.254.0.0/16 incl. 169.254.169.254 — keep this false
  allow_hosts: []             # extra explicit allow globs, e.g. ["api.partner.com"]
  deny_hosts: []              # explicit deny globs; win over everything, e.g. ["*.admin.home.lan"]

targets:
  # With an internal CA at defaults.verify, internal hosts need NO verify line —
  # they inherit the CA and validate normally.

  # --- monitoring (read-only) -------------------------------------------------
  prometheus:
    base_url: http://prometheus.home.lan:9090
    allowed_methods: [GET]    # never let it do anything but read
    # call: http_request(target="prometheus", url="/api/v1/query", params={"query":"up"})

  # --- local LLM --------------------------------------------------------------
  llama:
    base_url: http://llama.home.lan
    # http_request(target="llama", method="POST", url="/v1/chat/completions",
    #              json_body={"model":"...","messages":[...]})

  # --- internal HTTPS service: inherits the CA, verification stays ON ----------
  dozzle:
    base_url: https://dozzle.home.lan
    # no verify line needed once dozzle's cert is signed by your CA

  # --- container management (CA-signed cert, just needs an API key) ------------
  portainer:
    base_url: https://portainer.home.lan
    auth: { type: apikey, header: X-API-Key, value_env: PORTAINER_KEY }

  # --- the exception: a host you CAN'T re-issue a cert for (e.g. a vendor
  #     appliance with a baked-in self-signed cert). Override per-target only here.
  legacy-appliance:
    base_url: https://nas.home.lan
    verify: false

  # --- external site you publish to (public cert; bearer token from env) ------
  smartoffs:
    base_url: https://www.smartoffs.com
    auth: { type: bearer, token_env: SMARTOFFS_TOKEN }
    headers:
      Accept: application/json
