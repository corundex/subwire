services:
  subwire:
    build: .
    image: subwire:latest
    container_name: subwire
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SUBWIRE_HOST: 0.0.0.0
      SUBWIRE_PORT: "8080"
      # Put any secrets your targets reference here (or in a .env file beside this one):
      # SMARTOFFS_TOKEN: ${SMARTOFFS_TOKEN}
      # PORTAINER_KEY: ${PORTAINER_KEY}

    # Config is baked into the image (see Dockerfile) — nothing to mount, so this
    # works the same locally and on a remote host. After editing config.yaml,
    # rebuild with:   docker compose up -d --build
    #
    # OPTIONAL — for live-editing config locally without rebuilding each time,
    # uncomment to override the baked-in copy:
    # volumes:
    #   - ./config.yaml:/etc/subwire/config.yaml:ro

    # MCP endpoint for mcp-remote / Claude Desktop:  http://<host>:8080/mcp
